<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Giỏ Hàng</title>

    <link rel="stylesheet" href="../../assets/icon/fontawesome-free-7.1.0-web/css/all.min.css">
    
    <link rel="stylesheet" href="../../assets/css/cart.css"> 
</head>
<body>

    <div class="site-content-wrapper">

        <header class="site-header">
            <div class="header-inner container">
                <div class="header-left">
                    <div class="logo" aria-label="Pocky Doll">Pocky Doll</div>
                </div>

                <div class="header-center">
                    <div class="search-box" role="search" aria-label="Tìm kiếm">
                        <input id="searchInput" type="search" placeholder="Tìm kiếm" />
                        <button id="searchBtn" aria-label="Tìm">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    
                </div>
            </div>

            <div class="header-right">
                <a href="../../index.html" class="icon-with-label" data-title="Trang chủ" aria-label="Trang chủ">
                    <div class="icon-wrap">
                        <i class="fa-solid fa-house"></i>
                    </div>
                    <div class="icon-label">Trang chủ</div>
                </a>
            
                <a href="javascript:void(0)" id="cartIcon" class="icon-with-label" data-title="Giỏ hàng" aria-label="Giỏ hàng">
                    <div class="icon-wrap">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </div>
                    <div class="icon-label">Giỏ hàng</div>
                </a>
            
<a href="history.html" class="icon-with-label history-item" title="Xem Lịch Sử Mua Hàng">
    <div class="icon-wrap"> 
        <i class="fa-solid fa-clock-rotate-left"></i>
    </div>
    <span class="icon-label">Lịch Sử</span> 
</a>

                <a href="profile.html" class="icon-with-label" data-title="Tài khoản" aria-label="Tài khoản">
                    <div class="icon-wrap">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="icon-label">Tài khoản</div>
                </a>
            </div>
        </div>
    </header>
    
    <section class="container">

        <h1 class="page-title">GIỎ HÀNG</h1>

        <div class="cart-container">
            
            <div class="cart-header">
                <div><input type="checkbox" id="selectAllProductsTop" aria-label="Chọn tất cả" /></div>
                <div>Sản Phẩm</div>
                <div>Đơn Giá</div>
                <div>Số Lượng</div>
                <div>Tổng Tiền</div>
                <div>Thao Tác</div>
            </div>

            <div class="cart-section">
                </div>
        </div>

        <div class="empty-cart-message" id="emptyCartMessage">
            <h2>🛒 Giỏ hàng của bạn đang trống.</h2>
            <p style="color: var(--muted); margin-top: 10px;">Hãy thêm các sản phẩm yêu thích vào giỏ hàng để tiếp tục mua sắm!</p>
            <a href="../../index.html" class="buy-button" style="display: inline-block; margin-top: 20px; padding: 10px 20px; background: var(--blue); color: white; text-decoration: none;">Tiếp tục mua sắm</a>
        </div>

        </section>
    </div> 

    <div class="checkout-bar">
        <div class="checkout-inner">
            <div class="checkout-left">
                <label for="selectAllProductsBottom" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="selectAllProductsBottom" aria-label="Chọn tất cả" />
                    Chọn Tất Cả (<span id="selectedCount">0</span>)
                </label>
            </div>

            <div class="checkout-right">
                <div class="checkout-total-group">
                    <span class="label">Tổng cộng (0 sản phẩm):</span>
                    <span class="amount" id="checkoutTotalAmount"> 0₫ </span>
                </div>
                <button class="buy-button" id="simpleBuyButton">
                    Mua Hàng
                </button>
            </div>
        </div>
    </div>
    
    <script src="../../assets/js/cart.js"></script>
</body>
</html>
